spring:
  application:
    name: featureflagplatform

  datasource:
    url: jdbc:mysql://localhost:3306/feature_flag?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080